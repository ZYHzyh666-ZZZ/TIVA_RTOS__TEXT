      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks:
            - name: "[Copy linker output for Keil User Commands]"
              abortAfterFailed: true
              command: mkdir ${KEIL_OUTPUT_DIR} & copy "${OutDir}\${ProjectName}.axf" "${KEIL_OUTPUT_DIR}\${KEIL_OUTPUT_NAME}.axf"
              disable: false
            - name: fromelf.exe --bin -o ./ANO-LX.bin ./build/Ano_LX.axf
              abortAfterFailed: true
              command: fromelf.exe --bin -o ./ANO-LX.bin ./build/Ano_LX.axf
              disable: false
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --c99
            C_FLAGS: --c99
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            plain-char-is-signed: true
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
